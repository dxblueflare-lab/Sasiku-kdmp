<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Menu - Dapur Suplai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        merah: '#DC2626',
                        putih: '#FFFFFF',
                        emas: '#F59E0B',
                        gelap: '#1F2937',
                    }
                }
            }
        }
    </script>
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Main Content -->
    <div class="p-6 max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Update Menu</h1>
        
        <!-- Upload Form -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Unggah File Menu</h2>
            <p class="text-gray-600 mb-6">Unggah file dalam format .xls, .jpg, .jpeg, atau .png</p>
            
            <form id="uploadForm">
                <div class="mb-6">
                    <label class="block text-gray-700 font-medium mb-2" for="menuFile">
                        Pilih File Menu
                    </label>
                    <input 
                        type="file" 
                        id="menuFile" 
                        name="menuFile"
                        accept=".xls,.jpg,.jpeg,.png"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-merah focus:border-transparent"
                    >
                    <p class="text-gray-500 text-sm mt-2">Format yang diperbolehkan: .xls, .jpg, .jpeg, .png</p>
                </div>
                
                <button 
                    type="submit" 
                    class="bg-merah hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300"
                >
                    <i class="fas fa-upload mr-2"></i>Unggah File
                </button>
            </form>
        </div>
        
        <!-- Jumlah Penerima Manfaat Form -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Jumlah Penerima Manfaat</h2>
            <p class="text-gray-600 mb-6">Silakan isi jumlah penerima manfaat untuk masing-masing kategori</p>
            
            <form id="beneficiaryForm">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div>
                        <label class="block text-gray-700 font-medium mb-2" for="largePortion">
                            Porsi Besar
                        </label>
                        <input 
                            type="number" 
                            id="largePortion" 
                            name="largePortion"
                            min="0"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-merah focus:border-transparent"
                            placeholder="Masukkan jumlah"
                        >
                    </div>
                    
                    <div>
                        <label class="block text-gray-700 font-medium mb-2" for="smallPortion">
                            Porsi Kecil
                        </label>
                        <input 
                            type="number" 
                            id="smallPortion" 
                            name="smallPortion"
                            min="0"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-merah focus:border-transparent"
                            placeholder="Masukkan jumlah"
                        >
                    </div>
                    
                    <div>
                        <label class="block text-gray-700 font-medium mb-2" for="b3">
                            B3
                        </label>
                        <input 
                            type="number" 
                            id="b3" 
                            name="b3"
                            min="0"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-merah focus:border-transparent"
                            placeholder="Masukkan jumlah"
                        >
                    </div>
                </div>
                
                <button 
                    type="submit" 
                    class="bg-merah hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300"
                >
                    <i class="fas fa-save mr-2"></i>Simpan Data
                </button>
            </form>
        </div>
    </div>

    <script>
        // Handle file upload form submission
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('menuFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Silakan pilih file terlebih dahulu!');
                return;
            }
            
            // Validate file type
            const allowedTypes = ['.xls', '.jpg', '.jpeg', '.png'];
            const fileName = file.name.toLowerCase();
            const isValidType = allowedTypes.some(type => fileName.endsWith(type));
            
            if (!isValidType) {
                alert('Format file tidak valid! Harap unggah file dengan format .xls, .jpg, .jpeg, atau .png');
                return;
            }
            
            // In a real application, you would upload the file to the server here
            alert(`File "${file.name}" berhasil diunggah!`);
            fileInput.value = ''; // Reset the form
        });
        
        // Handle beneficiary form submission
        document.getElementById('beneficiaryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const largePortion = document.getElementById('largePortion').value;
            const smallPortion = document.getElementById('smallPortion').value;
            const b3 = document.getElementById('b3').value;
            
            // In a real application, you would save the data to the server here
            alert(`Data berhasil disimpan!\nPorsi Besar: ${largePortion}\nPorsi Kecil: ${smallPortion}\nB3: ${b3}`);
        });
    </script>
</body>
</html>
