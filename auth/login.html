<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dapur Suplai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        merah: '#DC2626',
                        putih: '#FFFFFF',
                        emas: '#F59E0B',
                        gelap: '#1F2937',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: url('https://c.pxhere.com/photos/99/f6/background_food_tasty_olives_wooden_background_cooking_plate_kitchen-1369813.jpg!d') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-12 max-w-md">
        <div class="login-card p-8">
            <div class="text-center mb-8">
                <div class="w-26 h-26 rounded-full flex items-center justify-center mx-auto mb-4">
                     <img src="https://www.appdapursuplai.org/images/logo.png" alt="Logo" width="150" height="150">
                </div>
                <h1 class="text-2xl font-bold text-merah">DAPUR SUPLAI</h1>
                <p class="text-gray-600">Silakan masuk ke akun Anda</p>
            </div>

            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
                        Username atau Email
                    </label>
                    <input type="text" id="username" name="username" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" placeholder="Masukkan username atau email" required>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                        Kata Sandi
                    </label>
                    <input type="password" id="password" name="password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" placeholder="••••••••" required>
                </div>

                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-start">
                        <div class="flex items-center h-5">
                            <input id="remember" type="checkbox" class="w-4 h-4 text-merah bg-gray-100 border-gray-300 rounded focus:ring-merah">
                        </div>
                        <label for="remember" class="ml-2 text-sm text-gray-600">Ingat saya</label>
                    </div>
                    <a href="#" class="text-sm text-merah hover:underline">Lupa kata sandi?</a>
                </div>

                <div id="errorMessage" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm"></div>

                <button type="submit" class="w-full bg-merah text-white py-3 rounded-xl font-bold hover:bg-red-700 transition shadow-lg">
                    Masuk
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600 text-sm">
                    Belum punya akun? 
                    <a href="register.html" class="text-merah font-semibold hover:underline">Daftar di sini</a>
                </p>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-200">
                <div class="flex justify-center space-x-6">
                    <a href="#" class="text-gray-500 hover:text-merah">
                        <i class="fab fa-facebook-f text-xl"></i>
                    </a>
                    <a href="#" class="text-gray-500 hover:text-merah">
                        <i class="fab fa-google text-xl"></i>
                    </a>
                    <a href="#" class="text-gray-500 hover:text-merah">
                        <i class="fab fa-twitter text-xl"></i>
                    </a>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-6">
            <a href="../index.html" class="text-white hover:text-emas flex items-center justify-center">
                <i class="fas fa-arrow-left mr-2"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Ambil nilai dari form
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Validasi sederhana
            if(username.trim() === '' || password.trim() === '') {
                showError('Username dan password harus diisi!');
                return;
            }
            
            // Simulasi proses login
            console.log('Username:', username);
            console.log('Password:', password);
            
            // Di sini akan dilakukan permintaan ke server untuk otentikasi
            // Untuk simulasi, kita gunakan beberapa kombinasi tetap
            if((username === 'admin' && password === 'admin123') ||
               (username === 'supplier' && password === 'supplier123') ||
               (username === 'customer' && password === 'customer123')) {
                
                // Tentukan role berdasarkan username
                let userData = {};
                if(username === 'admin') {
                    userData = {
                        id: 1,
                        username: 'admin',
                        role: 'admin',
                        nama_lengkap: 'Administrator'
                    };
                } else if(username === 'supplier') {
                    userData = {
                        id: 2,
                        username: 'supplier',
                        role: 'supplier',
                        nama_lengkap: 'Supplier Toko'
                    };
                } else if(username === 'customer') {
                    userData = {
                        id: 3,
                        username: 'customer',
                        role: 'customer',
                        nama_lengkap: 'Pelanggan'
                    };
                }
                
                // Simpan data pengguna ke sessionStorage
                sessionStorage.setItem('currentUser', JSON.stringify(userData));
                
                // Redirect ke dashboard sesuai role
                switch(userData.role) {
                    case 'admin':
                        window.location.href = '../admin/dashboard.html';
                        break;
                    case 'supplier':
                        window.location.href = '../supplier/dashboard.html';
                        break;
                    case 'customer':
                        window.location.href = '../customer/dashboard.html';
                        break;
                    default:
                        window.location.href = 'login.html';
                        break;
                }
            } else {
                // Login gagal
                showError('Username atau password salah!');
            }
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            
            // Sembunyikan error setelah 5 detik
            setTimeout(function() {
                errorDiv.classList.add('hidden');
            }, 5000);
        }
        
        // Fungsi untuk cek apakah pengguna sudah login
        function checkLoginStatus() {
            const currentUser = sessionStorage.getItem('currentUser');
            if(currentUser) {
                const user = JSON.parse(currentUser);
                
                // Redirect ke dashboard sesuai role
                switch(user.role) {
                    case 'admin':
                        window.location.href = '../admin/dashboard.html';
                        break;
                    case 'supplier':
                        window.location.href = '../supplier/dashboard.html';
                        break;
                    case 'customer':
                        window.location.href = '../customer/dashboard.html';
                        break;
                    default:
                        // Jika role tidak dikenali, hapus session dan kembali ke login
                        sessionStorage.removeItem('currentUser');
                        break;
                }
            }
        }
        
        // Cek status login saat halaman dimuat
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
        });
    </script>
</body>
</html>
