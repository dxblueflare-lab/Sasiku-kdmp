<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Dapur Suplai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        merah: '#DC2626',
                        putih: '#FFFFFF',
                        emas: '#F59E0B',
                        gelap: '#1F2937',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: url('https://c.pxhere.com/photos/99/f6/background_food_tasty_olives_wooden_background_cooking_plate_kitchen-1369813.jpg!d') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-12 max-w-md">
        <div class="register-card p-8">
            <div class="text-center mb-8">
                <div class="w-26 h-26 rounded-full flex items-center justify-center mx-auto mb-4">
                    <img src="https://www.appdapursuplai.org/images/logo.png" alt="Logo" width="150" height="150">
                </div>
                <h1 class="text-2xl font-bold text-merah">DAPUR SUPLAI</h1>
                <p class="text-gray-600">Buat akun baru Anda</p>
            </div>

            <form id="registerForm">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
                        Username
                    </label>
                    <input type="text" id="username" name="username" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" placeholder="Masukkan username" required>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="email">
                        Email
                    </label>
                    <input type="email" id="email" name="email" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" placeholder="Masukkan email" required>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="nama_lengkap">
                        Nama Lengkap
                    </label>
                    <input type="text" id="nama_lengkap" name="nama_lengkap" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" placeholder="Masukkan nama lengkap" required>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="alamat">
                        Alamat Lengkap
                    </label>
                    <textarea id="alamat" name="alamat" rows="3" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" placeholder="Masukkan alamat lengkap"></textarea>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="nomor_telepon">
                        Nomor Telepon
                    </label>
                    <input type="tel" id="nomor_telepon" name="nomor_telepon" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" placeholder="Masukkan nomor telepon">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="role">
                        Peran
                    </label>
                    <select id="role" name="role" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" required>
                        <option value="">Pilih Peran</option>
                        <option value="customer">Customer</option>
                        <option value="supplier">Supplier</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                        Kata Sandi
                    </label>
                    <input type="password" id="password" name="password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" placeholder="••••••••" required>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="password_confirmation">
                        Konfirmasi Kata Sandi
                    </label>
                    <input type="password" id="password_confirmation" name="password_confirmation" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" placeholder="••••••••" required>
                </div>

                <div id="errorMessage" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm"></div>

                <button type="submit" class="w-full bg-merah text-white py-3 rounded-xl font-bold hover:bg-red-700 transition shadow-lg">
                    Daftar
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600 text-sm">
                    Sudah punya akun? 
                    <a href="login.html" class="text-merah font-semibold hover:underline">Masuk di sini</a>
                </p>
            </div>
        </div>
        
        <div class="text-center mt-6">
            <a href="../index.html" class="text-white hover:text-emas flex items-center justify-center">
                <i class="fas fa-arrow-left mr-2"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Ambil nilai dari form
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const nama_lengkap = document.getElementById('nama_lengkap').value;
            const alamat = document.getElementById('alamat').value;
            const nomor_telepon = document.getElementById('nomor_telepon').value;
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const password_confirmation = document.getElementById('password_confirmation').value;
            
            // Validasi sederhana
            if(username.trim() === '' || email.trim() === '' || nama_lengkap.trim() === '' || role.trim() === '' || password.trim() === '' || password_confirmation.trim() === '') {
                showError('Semua field wajib diisi!');
                return;
            }
            
            if(password !== password_confirmation) {
                showError('Password dan konfirmasi password tidak cocok!');
                return;
            }
            
            if(password.length < 6) {
                showError('Password minimal 6 karakter!');
                return;
            }
            
            // Validasi email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(!emailRegex.test(email)) {
                showError('Format email tidak valid!');
                return;
            }
            
            // Simulasi proses registrasi
            console.log('Registrasi:', {
                username,
                email,
                nama_lengkap,
                alamat,
                nomor_telepon,
                role,
                password
            });
            
            // Di sini akan dilakukan permintaan ke server untuk registrasi
            // Untuk simulasi, kita simulasikan registrasi berhasil
            simulateRegistration(username, email, nama_lengkap, alamat, nomor_telepon, role, password);
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            
            // Hilangkan error setelah 5 detik
            setTimeout(function() {
                errorDiv.classList.add('hidden');
            }, 5000);
        }
        
        function simulateRegistration(username, email, nama_lengkap, alamat, nomor_telepon, role, password) {
            // Simulasi registrasi berhasil
            // Dalam implementasi nyata, ini akan dikirim ke server
            
            // Simulasi delay untuk proses
            setTimeout(function() {
                // Simpan informasi pengguna ke sessionStorage
                const newUser = {
                    id: Math.floor(Math.random() * 1000), // ID acak untuk simulasi
                    username: username,
                    email: email,
                    nama_lengkap: nama_lengkap,
                    alamat: alamat,
                    nomor_telepon: nomor_telepon,
                    role: role,
                    registered_at: new Date().toISOString()
                };
                
                sessionStorage.setItem('currentUser', JSON.stringify(newUser));
                
                // Tampilkan pesan sukses
                alert('Registrasi berhasil! Silakan login menggunakan akun Anda.');
                
                // Redirect ke halaman login
                window.location.href = 'login.html';
            }, 1000); // Delay 1 detik untuk simulasi
        }
    </script>
</body>
</html>
