<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Customer - Dapur Suplai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        merah: '#DC2626',
                        putih: '#FFFFFF',
                        emas: '#F59E0B',
                        gelap: '#1F2937',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #DC2626 0%, #991B1B 50%, #7F1D1D 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-12 max-w-md">
        <div class="login-card p-8 text-center">
            <div class="w-24 h-24 bg-gradient-to-br from-merah to-red-800 rounded-full flex items-center justify-center mx-auto mb-6">
                 <img src="https://www.appdapursuplai.org/images/logo.png" alt="Logo" width="120" height="120">
            </div>
            
            <h1 class="text-3xl font-bold text-merah mb-2">DAPUR SUPLAI</h1>
            <p class="text-gray-600 mb-8">Customer Panel Login</p>
            
            <form id="customerLoginForm">
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2 text-left" for="username">
                        Username atau Email
                    </label>
                    <input type="text" id="username" name="username" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" placeholder="Masukkan username atau email" required>
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2 text-left" for="password">
                        Kata Sandi
                    </label>
                    <input type="password" id="password" name="password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-merah focus:border-transparent" placeholder="••••••••" required>
                </div>
                
                <div class="flex items-center justify-between mb-6 text-left">
                    <div class="flex items-start">
                        <div class="flex items-center h-5">
                            <input id="remember" type="checkbox" class="w-4 h-4 text-merah bg-gray-100 border-gray-300 rounded focus:ring-merah">
                        </div>
                        <label for="remember" class="ml-2 text-sm text-gray-600">Ingat saya</label>
                    </div>
                    <a href="#" class="text-sm text-merah hover:underline">Lupa kata sandi?</a>
                </div>
                
                <div id="errorMessage" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm"></div>
                
                <button type="submit" class="w-full bg-merah text-white py-4 rounded-xl font-bold hover:bg-red-700 transition shadow-lg">
                    Masuk sebagai Customer
                </button>
            </form>
            
            <div class="mt-6">
                <p class="text-gray-600 text-sm">
                    Belum punya akun? 
                    <a href="register.html" class="text-merah font-semibold hover:underline">Daftar di sini</a>
                </p>
            </div>
            
            <div class="mt-6 text-center">
                <a href="../index.html" class="text-white hover:text-emas flex items-center justify-center">
                    <i class="fas fa-arrow-left mr-2"></i> Kembali ke Beranda
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('customerLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Validasi sederhana
            if(username.trim() === '' || password.trim() === '') {
                showError('Username dan password harus diisi!');
                return;
            }
            
            // Simulasi proses login customer
            if(username === 'customer' && password === 'customer123') {
                // Simpan informasi pengguna ke sessionStorage
                sessionStorage.setItem('currentUser', JSON.stringify({
                    id: 3,
                    username: 'customer',
                    role: 'customer',
                    nama_lengkap: 'Pelanggan'
                }));
                
                // Redirect ke dashboard customer
                window.location.href = 'customer/dashboard.html';
            } else {
                showError('Username atau password customer salah!');
            }
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            
            // Sembunyikan pesan error setelah 5 detik
            setTimeout(function() {
                errorDiv.classList.add('hidden');
            }, 5000);
        }
        
        // Cek apakah pengguna sudah login
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = sessionStorage.getItem('currentUser');
            
            if(currentUser) {
                const user = JSON.parse(currentUser);
                
                // Jika pengguna sudah login, redirect ke dashboard sesuai role
                switch(user.role) {
                    case 'admin':
                        window.location.href = 'admin/dashboard.html';
                        break;
                    case 'supplier':
                        window.location.href = 'supplier/dashboard.html';
                        break;
                    case 'customer':
                        window.location.href = 'customer/dashboard.html';
                        break;
                    default:
                        sessionStorage.removeItem('currentUser'); // Hapus session jika role tidak dikenali
                        break;
                }
            }
        });
    </script>
</body>
</html>
